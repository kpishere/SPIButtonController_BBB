# SPI Button Controller Configuration
# This file defines how the daemon monitors SPI buttons and responds to value changes

spi:
  # SPI device path (typically /dev/spidev<bus>.<cs>)
  device: /dev/spidev1.0
      
  # SPI clock speed in Hz
  speed_hz: 800000  # 800 kHz
  
  # SPI mode (0-3)
  mode: 0

# Polling and debounce configuration
polling:
  # How often to poll the buttons (in milliseconds)
  interval_ms: 100

klipper:
  socket_path: /tmp/klippy_uds

# Register mappings and value triggers
buttons:
  - button: 19
  # Fire events on: SPIButtonState::OnChange (0x20) | SPIButtonState::OnHold (0x40), lamp toggle feature SPIButtonState::Toggle (0x08)
    config: 0x68
    description: "Lamp OFF"
    command: "klipper:gcode/script|{\"script\":\"SET_PIN PIN=caselight_ht3 VALUE=0\"}"
      
  - button: 18
    config: 0x68
    description: "Lamp ON"
    command: "klipper:gcode/script|{\"script\":\"SET_PIN PIN=caselight_ht3 VALUE=1\"}"
      
  - button: 17
    config: 0x68
    description: "Home X"
    command: "klipper:gcode/script|{\"script\":\"G28 X\"}"

  - button: 16
    config: 0x68
    description: "Pre-Heat"
    command: "klipper:gcode/script|{\"script\":\"PRE_WARM\"}"

  - button: 15
    config: 0x68
    description: "Home Z"
    command: "klipper:gcode/script|{\"script\":\"G28 Z\"}"

  - button: 14
    config: 0x68
    description: "Home Y"
    command: "klipper:gcode/script|{\"script\":\"G28 Y\"}"
  
  - button: 13
    config: 0x68
    description: "Bed Dn"
    command: "klipper:gcode/script|{\"script\":\"MOVE_UP\"}"

  - button: 12
    config: 0x68
    description: "Bed Lvl"
    command: "klipper:gcode/script|{\"script\":\"Z_TILT_ADJUST\"}"

  - button: 11
    config: 0x68
    description: "Retract -10"
    command: "klipper:gcode/script|{\"script\":\"G10\"}"

  - button: 10
    config: 0x68
    description: "Extrd +10"
    command: "klipper:gcode/script|{\"script\":\"G11\"}"

  - button: 9
    config: 0x68
    description: "Jog Cls"
    command: "klipper:gcode/script|{\"script\":\"M290 R1 Z-0.05\"}"

  - button: 8
    config: 0x68
    description: "Jog Opn"
    command: "klipper:gcode/script|{\"script\":\"M290 R1 Z0.05\"}"

  - button: 7
    config: 0x68
    description: "Pfan -"
    command: "klipper:gcode/script|{\"script\":\"M107\"}"

  - button: 6
    config: 0x68
    description: "Pfan +"
    command: "klipper:gcode/script|{\"script\":\"M106 S1.0\"}"

  - button: 5
    config: 0x68
    description: "Speed -"
    command: "klipper:gcode/script|{\"script\":\"M220 S90\"}"

  - button: 4
    config: 0x68
    description: "Speed +"
    command: "klipper:gcode/script|{\"script\":\"M220 S110\"}"

  - button: 3
    config: 0x68
    description: "Lyr Resume"
    command: "klipper:gcode/script|{\"script\":\"M106 S1.0\"}"

  - button: 2
    config: 0x68
    description: "Lyr Pause"
    command: "klipper:gcode/script|{\"script\":\"M106 S1.0\"}"

  - button: 1
    config: 0x68
    description: "Rst Klipper"
    command: "service klipper restart"

  - button: 0
    config: 0x68
    description: "Power dn"
    command: "/usr/sbin/poweroff"
